name: Weekly METACRAN Scan

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch: # Allows you to manually click "Run" from GitHub web

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          install.packages(c("httr2", "jsonlite", "remotes"))
          remotes::install_local(".")
        shell: Rscript {0}

      - name: Run lookeR Scanner
        run: |
          results <- lookeR::scan_metacran()
          print(results)
        shell: Rscript {0}
